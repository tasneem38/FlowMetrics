<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog — FlowMetrics</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="navWrap">
    <div class="container">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brandMark"></span>
          <span>FlowMetrics</span>
        </a>
      </div>
    </div>
  </div>

  <section class="section alt" style="padding:60px 0;">
    <div class="container">
      <h1 class="sectionTitle">Blog</h1>
      <p class="sectionDesc">Latest insights from FlowMetrics.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!-- THIS IS WHAT YOU WERE MISSING -->
      <div id="blogGrid" class="blogGrid"></div>
    </div>
  </section>

  <script src="posts.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const grid = document.getElementById("blogGrid");
      const posts = window.BLOG_POSTS || [];

      const formatDate = (iso) => {
        const d = new Date(iso);
        return d.toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric"
        });
      };

      grid.innerHTML = posts.map(post => `
        <a class="postCard" href="post.html?id=${post.id}">
          <div class="postThumb"
               style="background-image:url('${post.cover}');
                      background-size:cover;
                      background-position:center;">
          </div>
          <div class="postBody">
            <div class="meta">
              ${post.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
              <span>${formatDate(post.date)}</span>
              <span>•</span>
              <span>${post.author}</span>
            </div>
            <h3>${post.title}</h3>
            <p>${post.excerpt}</p>
          </div>
        </a>
      `).join("");
    });
  </script>

</body>

</html>
